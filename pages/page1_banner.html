<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> · Banner配置原型</title>
  <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body>
  <header id="app-header">
    <div class="brand"> · Banner配置原型</div>
  </header>
  <main class="container">
    <aside class="sidebar">
      <nav>
        <ul>
          <li><a href="page1_banner.html"> Banner配置</a></li>
          <li><a href="page2_club.html"> 俱乐部配置</a></li>
          <li><a href="page3_shop.html"> 商城商品配置</a></li>
          <li><a href="page4_points.html"> 积分兑换配置</a></li>
          <li><a href="page5_import.html"> 非小程序消费导入</a></li>
          <li><a href="page6_activity.html"> 活动配置</a></li>
          <li><a href="../index.html">返回首页</a></li>
        </ul>
      </nav>
    </aside>
    <section class="content">
      <div class="card">
        <h2>顶部 Banner 配置能力</h2>
        <form id="form-top-banner" class="form-grid">
          <div class="form-item">
            <label>选择 Banner 位（必选）</label>
            <select name="top_slot" required>
              <option value="位1">位1</option>
              <option value="位2">位2</option>
              <option value="位3">位3</option>
            </select>
            <div class="help">说明：选择对应的 banner 位置进行编辑</div>
          </div>
          <div class="form-item">
            <label>Banner 图片（必选）</label>
            <input type="file" accept="image/*" name="top_image" required />
            <div class="help">说明：Banner 展示主图</div>
          </div>
          <div class="form-item">
            <label>内容类型（链接或通知文本）</label>
            <select name="top_content_type" id="top-content-type">
              <option value="link">H5 链接</option>
              <option value="text">通知内容</option>
            </select>
          </div>
          <div class="form-item" id="top-link-wrap">
            <label>H5 链接（必选）</label>
            <input type="url" name="top_link" placeholder="https://..." required />
            <div class="help">说明：跳转的 H5 页面地址</div>
          </div>
          <div class="form-item" id="top-text-wrap" style="display:none;">
            <label>通知内容（必选）</label>
            <textarea name="top_text" placeholder="请输入通知文案"></textarea>
            <div class="help">说明：通知文案内容</div>
          </div>
          <div class="form-item">
            <label>开始时间（必选）</label>
            <input type="datetime-local" name="top_start" required data-auto-now="true" />
            <div class="help">说明：Banner 上线时间</div>
          </div>
          <div class="form-item">
            <label>结束时间（必选）</label>
            <input type="datetime-local" name="top_end" required />
            <div class="help">说明：Banner 下线时间</div>
          </div>
          <div class="form-item">
            <label>是否展示（必选）</label>
            <div class="switch">
              <input type="checkbox" name="top_show" checked />
              <span class="muted">控制前端是否展示</span>
            </div>
          </div>
        </form>
        <div class="btn-row">
          <button class="btn primary" id="btn-preview">预览配置</button>
          <button class="btn" id="btn-publish-1">确认并发布</button>
        </div>
      </div>

      <div class="card">
        <h2>活动 Banner 配置能力</h2>
        <form id="form-activity-banner" class="form-grid">
          <div class="form-item">
            <label>活动展示 Banner（123 号位）选择（必选）</label>
            <select name="act_slot" required>
              <option value="1号位">1号位</option>
              <option value="2号位">2号位</option>
              <option value="3号位">3号位</option>
            </select>
            <div class="help">说明：展示对应选中活动</div>
          </div>
          <div class="form-item">
            <label>选择活动（必选）</label>
            <select name="act_activity" required>
              <option value="">请选择活动</option>
              <option value="活动A">活动A</option>
              <option value="活动B">活动B</option>
              <option value="活动C">活动C</option>
            </select>
            <div class="help">说明：Banner 展示对应选中活动</div>
          </div>
          <div class="form-item">
            <label>Banner 封面图（可选）</label>
            <input type="file" accept="image/*" name="act_cover" />
            <div class="help">说明：未选择则沿用活动封面图</div>
          </div>
        </form>
        <div class="btn-row">
          <button class="btn" id="btn-preview-2">预览配置</button>
          <button class="btn" id="btn-publish-2">确认并发布</button>
        </div>
      </div>
    </section>
  </main>

  <script src="../assets/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const typeSel = document.getElementById('top-content-type');
      const linkWrap = document.getElementById('top-link-wrap');
      const textWrap = document.getElementById('top-text-wrap');
      const sync = () => {
        const isLink = typeSel.value === 'link';
        linkWrap.style.display = isLink ? '' : 'none';
        textWrap.style.display = isLink ? 'none' : '';
      };
      typeSel.addEventListener('change', sync);
      sync();
    });
  </script>
</body>
</html>
