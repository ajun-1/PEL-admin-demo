<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> 非小程序消费数据导入原型</title>
  <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body>
  <header id="app-header">
    <div class="brand"> 非小程序消费数据导入原型</div>
  </header>
  <main class="container">
    <aside class="sidebar">
      <nav>
        <ul>
          <li><a href="page1_banner.html"> Banner配置</a></li>
          <li><a href="page2_club.html"> 俱乐部配置</a></li>
          <li><a href="page3_shop.html"> 商城商品配置</a></li>
          <li><a href="page4_points.html"> 积分兑换配置</a></li>
          <li><a href="page5_import.html"> 非小程序消费导入</a></li>
          <li><a href="page6_activity.html"> 活动配置</a></li>
          <li><a href="../index.html">返回首页</a></li>
        </ul>
      </nav>
    </aside>
    <section class="content">
      <div class="card">
        <h2>导入Excel文件</h2>
        <form id="form-import" class="form-grid">
          <div class="form-item">
            <label>导入类型（必选）</label>
            <select name="import_type" id="import-type" required>
              <option value="excel1">Excel1 · 粉丝直播打赏数据</option>
              <option value="excel2">Excel2 · 非小程序消费数据</option>
            </select>
          </div>
          <div class="form-item" style="grid-column: 1 / -1;">
            <label>选择Excel文件（必选）</label>
            <input type="file" name="excel" accept=".xls,.xlsx" required />
            <div class="help">说明：上传后将按字段规则校验并计算成长值（原型不做真实解析）。</div>
          </div>
        </form>
        <div class="btn-row">
          <button class="btn primary" id="btn-validate">模拟导入校验</button>
        </div>
        <div id="preview" class="preview"></div>
      </div>

      <div class="card info">
        <h2>Excel1 · 粉丝直播打赏数据字段</h2>
        <div class="form-grid">
          <div class="form-item"><label>小程序UID（必填）</label><input type="text" value="示例：user_123" disabled /></div>
          <div class="form-item"><label>直播平台</label><input type="text" value="抖音/虎牙..." disabled /></div>
          <div class="form-item"><label>直播平台ID（必填）</label><input type="text" value="示例：douyin_abc" disabled /></div>
          <div class="form-item"><label>打赏金额</label><input type="text" value="数值型" disabled /></div>
          <div class="form-item"><label>选手姓名</label><input type="text" value="文本" disabled /></div>
          <div class="form-item"><label>归属俱乐部</label><input type="text" value="文本" disabled /></div>
        </div>
      </div>

      <div class="card info">
        <h2>Excel2 · 非小程序消费数据字段</h2>
        <div class="form-grid">
          <div class="form-item"><label>小程序UID（必填）</label><input type="text" value="示例：user_123" disabled /></div>
          <div class="form-item"><label>消费平台</label><input type="text" value="例：AG小卖部/京酱" disabled /></div>
          <div class="form-item"><label>消费金额</label><input type="text" value="数值型" disabled /></div>
          <div class="form-item"><label>归属俱乐部</label><input type="text" value="文本" disabled /></div>
        </div>
      </div>

      <div class="card info">
        <h2>运营流程说明</h2>
        <ul>
          <li>俱乐部收集粉丝打赏/消费数据 → 汇总生成标准Excel。</li>
          <li>运营人员导入后台 → 自动计算成长值（原型为模拟）。</li>
        </ul>
      </div>
    </section>
  </main>

  <script src="../assets/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('form-import');
      const btn = document.getElementById('btn-validate');
      const pv = document.getElementById('preview');
      btn.addEventListener('click', () => {
        const d = collectFormData(form);
        const summary = {
          导入类型: d.import_type === 'excel1' ? '直播打赏数据' : '非小程序消费数据',
          文件名: d.excel || '未选择',
          校验: '示例校验：UID/平台ID为必填，金额需为数值',
          结果: '原型演示：假设校验通过，已计算成长值'
        };
        pv.textContent = JSON.stringify(summary, null, 2);
      });
    });
  </script>
</body>
</html>
