</head>
<body>
<header id="app-header"><div class="brand">PEL 分之一 — 运营管理后台</div></header>
<main class="container">
<aside class="sidebar">
      <nav><ul>
        <li><a href="page0_user.html">用户管理</a></li>
        <li><a href="page1_banner.html">配置中心</a></li>
        <li><a href="page2_club.html">俱乐部管理</a></li>
        <li><a href="page6_activity.html">活动管理</a></li>
        <li><a href="page7_product.html">积分兑换商品</a></li>
        <li><a href="page8_review.html">审核中心</a></li>
        <li><a href="page5_import.html" class="active">数据导入</a></li>
        <li><a href="page9_feedback.html">问题反馈</a></li>
        <li><a href="page10_account.html">账号管理</a></li>
      </ul></nav></aside>
<section class="content">

<div class="card"><h2>导入Excel文件</h2>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
<div><label>导入类型</label><select><option>成长值导入</option><option>积分导入</option></select></div>
<div><label>选择文件</label><input type="file" accept=".xlsx,.csv"/></div>
</div>
<button class="btn primary">开始导入</button>
<div id="preview" style="margin-top:12px;background:#f1f5f9;padding:10px;border-radius:6px;font-size:13px;white-space:pre-wrap">预览结果将在此显示</div></div>

<div class="card" style="margin-top:20px"><h2>Excel模板下载</h2>
<p style="color:#6b7280;font-size:13px;margin-bottom:12px">模板列：UID | 数量 | 源头说明 | 关联业务ID</p>
<div style="display:flex;gap:8px">
<button class="btn" id="btn-dl-growth">下载成长值导入模板</button>
<button class="btn" id="btn-dl-points">下载积分导入模板</button>
</div></div>

<div class="card" style="margin-top:20px"><h2>运营流程说明</h2>
<ol style="color:#4b5563;font-size:14px;line-height:2">
<li>下载对应类型的Excel模板</li>
<li>按模板格式填写（UID必填，数量为正整数）</li>
<li>上传文件，系统自动校验格式和数据有效性</li>
<li>校验通过后数据即时生效，积分/成长值到账</li>
<li>校验失败的行标红提示，修正后重新上传</li>
</ol></div>

<script>
function dlCSV(fn,rows){
const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;
document.body.appendChild(a);a.click();URL.revokeObjectURL(a.href);a.remove();
}
document.getElementById('btn-dl-growth').onclick=()=>dlCSV('成长值导入模板.csv',[['UID','成长值数量','源头说明','关联业务ID']]);
document.getElementById('btn-dl-points').onclick=()=>dlCSV('积分导入模板.csv',[['UID','积分数量','源头说明','关联业务ID']]);
</script>

</section>
</main>
<script src="../assets/js/common.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{ensureAuth();});</script>
</body>
</html>
