<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> 积分兑换配置原型</title>
  <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body>
  <header id="app-header">
    <div class="brand"> 积分兑换配置原型</div>
  </header>
  <main class="container">
    <aside class="sidebar">
      <nav>
        <ul>
          <li><a href="page1_banner.html"> Banner配置</a></li>
          <li><a href="page2_club.html"> 俱乐部配置</a></li>
          <li><a href="page3_shop.html"> 商城商品配置</a></li>
          <li><a href="page4_points.html"> 积分兑换配置</a></li>
          <li><a href="page5_import.html"> 非小程序消费导入</a></li>
          <li><a href="page6_activity.html"> 活动配置</a></li>
          <li><a href="../index.html">返回首页</a></li>
        </ul>
      </nav>
    </aside>
    <section class="content">
      <div class="card">
        <h2>积分兑换配置</h2>
        <form id="form-points" class="form-grid">
          <div class="form-item">
            <label>积分商品名称（必选）</label>
            <input type="text" name="title" required />
          </div>
          <div class="form-item">
            <label>商品类型（必选）</label>
            <select name="type" id="points-type" required>
              <option>实体商品</option>
              <option>虚拟商品</option>
              <option>线下权益</option>
            </select>
          </div>
          <div class="form-item">
            <label>商品封面图（必选）</label>
            <input type="file" name="cover" accept="image/*" required />
          </div>
          <div class="form-item" style="grid-column: 1 / -1;">
            <label>商品简介图片（可选）</label>
            <input type="file" name="intro_images" accept="image/*" multiple />
            <div class="help">说明：支持上传商品简介展示图片（JPG/PNG），可多张。</div>
          </div>
          <div class="form-item">
            <label>所需积分（必选）</label>
            <input type="number" name="need_points" min="0" step="1" required />
          </div>
          <div class="form-item">
            <label>库存数量（必选）</label>
            <input type="number" name="stock" min="0" step="1" required />
          </div>
          <div class="form-item">
            <label>每人限兑次数（可选）</label>
            <input type="number" name="limit_per_user" min="0" step="1" />
          </div>
          <div class="form-item">
            <label>兑换开始时间（必选）</label>
            <input type="datetime-local" name="start" required />
          </div>
          <div class="form-item">
            <label>兑换结束时间（可选）</label>
            <input type="datetime-local" name="end" />
          </div>
          <!-- 分类专属配置面板：根据“商品类型”切换显示（与商城商品配置一致） -->
          <div id="points-category-panels" style="grid-column: 1 / -1;">
            <!-- 实体商品面板 -->
            <div id="points-panel-real" class="card info" style="display:none;">
              <h3>实体商品配置</h3>
              <div class="form-grid">
                <div class="form-item">
                  <label>发货方式（固定）</label>
                  <input type="text" value="实体发货" name="delivery_real_points" disabled />
                </div>
              </div>
            </div>

            <!-- 虚拟商品面板 -->
            <div id="points-panel-virtual" class="card info" style="display:none;">
              <h3>虚拟商品配置</h3>
              <div class="form-grid">
                <div class="form-item">
                  <label>虚拟发放类型（可选）</label>
                  <select name="virtual_issue_type_points">
                    <option value="">不选择</option>
                    <option>自动发放</option>
                    <option>后台审核发放</option>
                  </select>
                </div>
                <div class="form-item" style="grid-column: 1 / -1;">
                  <label>虚拟发放内容（可选）</label>
                  <select name="virtual_issue_entry_points" id="virtual-content-select-points">
                    <option value="">不选择</option>
                    <option>图片</option>
                    <option>视频</option>
                    <option>活动二维码（自动生成）</option>
                  </select>
                  <div class="help">说明：根据选择显示对应配置入口；不提供链接内容。</div>
                </div>
                <div id="points-virtual-image" class="form-item" style="display:none; grid-column: 1 / -1;">
                  <label>上传图片</label>
                  <input type="file" name="virtual_image_file_points" accept="image/*" />
                </div>
                <div id="points-virtual-video" class="form-item" style="display:none; grid-column: 1 / -1;">
                  <label>上传视频</label>
                  <input type="file" name="virtual_video_file_points" accept="video/*" />
                </div>
                <div id="points-virtual-code" class="form-item" style="display:none;">
                  <label>活动二维码</label>
                  <input type="text" value="系统自动生成" name="virtual_code_auto_points" disabled />
                </div>
                <div class="form-item">
                  <label>发货方式（固定）</label>
                  <input type="text" value="虚拟发放" name="delivery_virtual_points" disabled />
                </div>
              </div>
            </div>


            <!-- 线下权益面板 -->
            <div id="points-panel-offline" class="card info" style="display:none;">
              <h3>线下权益配置</h3>
              <div class="form-grid">
                <div class="form-item">
                  <label>线下活动权益绑定（可选）</label>
                  <select name="offline_benefit_bind_offline_points">
                    <option value="">不绑定</option>
                    <option>活动A</option>
                    <option>活动B</option>
                  </select>
                </div>
                <div class="form-item">
                  <label>核销二维码（自动生成）</label>
                  <input type="text" name="verify_qr_offline_points" value="系统自动生成" disabled />
                </div>
                <div class="form-item">
                  <label>发货方式（固定）</label>
                  <input type="text" value="线下核销" name="delivery_offline_points" disabled />
                </div>
              </div>
            </div>
          </div>
          <div class="form-item">
            <label>等级限制（可选）</label>
            <select name="limit_level">
              <option value="">不限</option>
              <option>Lv1</option>
              <option>Lv2</option>
              <option>Lv3</option>
              <option>Lv4</option>
              <option>Lv5</option>
            </select>
          </div>
          <!-- 发货方式由分类面板固定展示，不在主表单中选择 -->
          <div class="form-item">
            <label>商品状态（必选）</label>
            <select name="status" required>
              <option>上架</option>
              <option>下架</option>
            </select>
          </div>

          <div class="form-item">
            <label>是否积分退还（可选）</label>
            <div class="switch"><input type="checkbox" name="refund_points" /></div>
          </div>
          <div class="form-item">
            <label>排序权重（可选）</label>
            <input type="number" name="weight" min="0" step="1" />
          </div>
        </form>
        <div class="btn-row">
          <button class="btn primary" id="btn-preview">预览配置</button>
          <button class="btn" id="btn-publish-4">确认并发布</button>
        </div>
      </div>
    </section>
  </main>

  <script src="../assets/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 分类面板切换（与商城商品配置一致）
      toggleBySelect('points-type', {
        'points-panel-real': ['实体商品'],
        'points-panel-virtual': ['虚拟商品'],
        'points-panel-offline': ['线下权益']
      });
      // 虚拟发放内容入口切换
      toggleBySelect('virtual-content-select-points', {
        'points-virtual-image': ['图片'],
        'points-virtual-video': ['视频'],
        'points-virtual-code': ['活动二维码（自动生成）']
      });
    });
  </script>
</body>
</html>
