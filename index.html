<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PEL 分之一粉运后台登录</title>
  <link rel="stylesheet" href="assets/css/base.css" />
</head>
<body class="login-page">
  <section class="login-card">
    <header>
      <h1>PEL 分之一粉运后台</h1>
      <p class="hint">账号：admin　密码：123456</p>
    </header>
    <form id="login-form">
      <div class="login-row">
        <label for="username">账号</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入账号" required />
      </div>
      <div class="login-row">
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
      </div>
      <div class="login-footer">
        <label class="login-inline">
          <input type="checkbox" id="remember" />
          记住登录
        </label>
        <label class="login-inline">
          <input type="checkbox" id="toggle-password" />
          显示密码
        </label>
      </div>
      <button class="btn primary" type="submit">登录</button>
      <div id="login-msg" class="error" aria-live="polite"></div>
    </form>
  </section>
  <script src="assets/js/common.js"></script>
  <script>PELAdmin.initLogin();</script>
</body>
</html>
